<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --panel-padding: 16px;
            --section-gap: 16px;
            --item-gap: 8px;
        }

        body {
            margin: 0;
            padding: var(--panel-padding);
            display: flex;
            flex-direction: column;
            gap: var(--section-gap);
            color: var(--uxp-host-text-color);
            font-family: var(--uxp-host-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif);
            font-size: var(--uxp-host-font-size, 12px);
            background-color: transparent;
            box-sizing: border-box;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: var(--item-gap);
        }

        .section-title {
            font-weight: bold;
            font-size: 11px;
            color: var(--uxp-host-text-color-secondary, #999);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        sp-button {
            width: 100%;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row-spaced {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .half-btn {
            width: calc(50% - 4px);
        }

        sp-textfield {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="section">
        <div class="section-title">Canvas Resize</div>
        <sp-button id="btnFit" variant="primary">Fit to Canvas (No Crop)</sp-button>
        <sp-button id="btnFill" variant="primary">Fill Canvas (Crop)</sp-button>
    </div>

    <div class="section">
        <div class="section-title">Options</div>
        <sp-checkbox id="chkAutoRotate">Auto Rotate Picture</sp-checkbox>
    </div>

    <sp-divider size="S"></sp-divider>

    <div class="section">
        <div class="section-title">Artboard Extraction</div>
        <sp-button id="btnNewDoc" variant="secondary">Send to New Doc...</sp-button>
    </div>

    <dialog id="dlgNewDoc">
        <form method="dialog"
            style="display: flex; flex-direction: column; gap: var(--section-gap); width: 280px; padding: 4px;">
            <sp-heading size="S">New Document Size</sp-heading>

            <sp-dropdown id="drpDialogSize" style="width: 100%;">
                <sp-menu slot="options">
                    <sp-menu-item value="720">1280 x 720 (720p)</sp-menu-item>
                    <sp-menu-item value="1080" selected>1920 x 1080 (1080p)</sp-menu-item>
                    <sp-menu-item value="1440">2560 x 1440 (2K)</sp-menu-item>
                    <sp-menu-item value="2160">3840 x 2160 (4K)</sp-menu-item>
                    <sp-menu-item value="custom">Custom...</sp-menu-item>
                </sp-menu>
            </sp-dropdown>

            <div id="divCustomSize" class="row-spaced" style="display: none;">
                <sp-textfield id="txtWidth" type="number" value="1920">
                    <sp-label slot="label">Width (px)</sp-label>
                </sp-textfield>
                <div style="margin-top: 14px;">&times;</div>
                <sp-textfield id="txtHeight" type="number" value="1080">
                    <sp-label slot="label">Height (px)</sp-label>
                </sp-textfield>
            </div>

            <div class="row" style="justify-content: flex-end; margin-top: 8px;">
                <sp-button id="btnCancel" variant="secondary" quiet>Cancel</sp-button>
                <sp-button id="btnCreate" variant="cta">Create</sp-button>
            </div>
        </form>
    </dialog>

    <sp-divider size="S"></sp-divider>

    <div class="section">
        <div class="section-title">Quick Export</div>
        <div class="row-spaced">
            <sp-button id="btnExportLayer" variant="secondary" class="half-btn">Layer as PNG</sp-button>
            <sp-button id="btnExportDoc" variant="secondary" class="half-btn">Doc as PNG</sp-button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
